name: Update PI Ecosystem Data

on:
  schedule:
    # 每周一 03:00 UTC 自动运行
    - cron: '0 3 * * 1'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync npm registry data
        run: node scripts/sync-npm-registry.mjs

      - name: Check for changes
        id: check
        run: |
          if [[ -n $(git status --porcelain data/) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update ecosystem overview
        if: steps.check.outputs.changed == 'true'
        run: |
          node scripts/generate-docs-from-data.mjs

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'docs: update pi ecosystem data [automated]'
          title: '📊 Weekly PI Ecosystem Update'
          body: |
            Automated update of PI extension ecosystem data.

            - Fetched latest npm registry data for `pi-package` keyword
            - Updated classification and statistics
            - Generated updated documentation

            🤖 Generated by GitHub Actions
          branch: auto/ecosystem-update
          base: main
          labels: |
            automated
            documentation
